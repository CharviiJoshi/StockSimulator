<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Time-Travel Portfolio Engine</title>
    <meta name="description" content="Sign in to your Time-Travel Portfolio Engine account.">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Stock Simulator</h1>
            <p>Welcome back! Sign in to your account.</p>
        </div>

        <form action="#" method="POST" id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@university.edu" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary">Sign In</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="register.html">Create one</a></p>
        </div> 
    </div>
</body>
</html>
