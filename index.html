<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <main class="card">
    <header class="head">
      <div>
        <h1>Edit Your Profile</h1>
      </div>
      <span class="badge">Account Active</span>
    </header>

    <form id="profileForm" novalidate>
      <section class="avatar-wrap">
        <img id="avatarPreview" class="avatar" src="https://i.pinimg.com/564x/3f/9f/5b/3f9f5b8c9f31ce16c79d48b9eeda4de0.jpg" alt="Profile avatar" />
        <input id="avatarInput" type="file" accept="image/*" />
        <p class="small">PNG/JPG up to 2MB</p>
      </section>

      <section class="inputs">
        <div class="field">
          <label for="firstName">First Name</label>
          <input id="firstName" name="firstName" type="text" required />
        </div>
        <div class="field">
          <label for="lastName">Last Name</label>
          <input id="lastName" name="lastName" type="text" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>
        <div class="field">
          <label for="phone">Phone Number</label>
          <input id="phone" name="phone" type="tel" />
        </div>
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" required />
        </div>
        <div class="field">
          <label for="timezone">Timezone</label>
          <select id="timezone" name="timezone">
            <option>Asia/Kolkata (GMT+5:30)</option>
            <option>America/New_York (GMT-5)</option>
            <option>Europe/London (GMT+0)</option>
          </select>
        </div>
        <div class="field full">
          <label for="bio">Bio</label>
          <textarea id="bio" name="bio" placeholder="Tell people about yourself..."></textarea>
        </div>

        <div id="formMessage" class="message" role="alert"></div>

        <div class="actions">
          <button type="button" class="btn-ghost" id="cancelBtn">Cancel</button>
          <button type="button" class="btn-danger" id="resetBtn">Reset</button>
          <button type="submit" class="btn-primary">Save Profile</button>
        </div>
      </section>
    </form>
  </main>
  <script src="script.js"></script>
</body>
</html>
