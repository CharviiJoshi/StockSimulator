<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Time-Travel Portfolio Engine</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Create your account to get started.</h1>
        </div>
        <form action="#" method="POST">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Alex Johnson" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="xyz@gmail.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <span class="helper-text">Must be at least 8 characters.</span>
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Register</button>
            <div class="auth-footer">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </form>
    </div>

  
</body>

</html>
