<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Time-Travel Portfolio Engine</title>
    <!-- Semantic CSS from the Humanized UI -->
    <link rel="stylesheet" href="forgot_password.css">
    <script src="forgot_password.js" defer></script>
</head>

<body class="centered-layout">

    <!-- Centered Form Panel -->
    <main class="layout-form-panel" aria-label="Password Reset Form">
        <div class="form-container">
            
            <header class="form-header" style="text-align: center;">
                <h2>Forgot Password</h2>
                <p class="form-subheading">Enter your simulation email to receive a recovery link.</p>
            </header>

            <form id="forgotPasswordForm" class="registration-form" novalidate>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@university.edu" required
                        autocomplete="email">
                </div>

                <div style="margin-top: 1rem;">
                    <button type="submit" class="submit-action-button" style="width: 100%;">Send Recovery Link</button>
                </div>

                <footer class="auth-redirect" style="margin-top: 2rem;">
                    <p>Remembered your password? <a href="login.html">Sign in here</a></p>
                </footer>

            </form>
        </div>
    </main>

</body>

</html>
